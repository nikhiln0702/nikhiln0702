name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: nikhiln0702
          outputs: |
            github-contribution-grid-snake.svg

      - name: Push to main
        uses: EndBug/add-and-commit@v9
        with:
          add: 'github-contribution-grid-snake.svg'
          message: 'Generate contribution snake'
