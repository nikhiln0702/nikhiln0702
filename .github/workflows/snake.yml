name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Checkout repository (THIS FIXES YOUR ERROR)
      - uses: actions/checkout@v3

      # STEP 2: Generate snake SVG
      - uses: Platane/snk@v3
        with:
          github_user_name: nikhiln0702
          outputs: github-contribution-grid-snake.svg

      # STEP 3: Commit generated file
      - uses: EndBug/add-and-commit@v9
        with:
          add: 'github-contribution-grid-snake.svg'
          message: 'Generate contribution snake'
